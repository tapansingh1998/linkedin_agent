services:
  - type: web
    name: linkedin-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASS
        sync: false
      - key: APPROVAL_EMAIL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
    healthCheckPath: /health
